# Render Blueprint — deploy FastAPI paper-trading API
# Dashboard: New → Blueprint → connect brandonlacoste9-tech/tradingbot
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: tradingbot-api
    runtime: python
    plan: free
    region: oregon
    rootDir: apps/api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: PAPER_ONLY
        value: "true"
      - key: CONFIRM_TTL_SECONDS
        value: "180"
      - key: ALPACA_BASE_URL
        value: "https://paper-api.alpaca.markets"
      - key: ALPACA_DATA_URL
        value: "https://data.alpaca.markets"
      # Comma-separated browser origins allowed to call the API
      - key: CORS_ORIGINS
        value: "https://hilarious-piroshki-08d173.netlify.app,http://localhost:3000"
      # Set these as secrets in the Render dashboard (or sync from here as sync: false)
      - key: ALPACA_API_KEY_ID
        sync: false
      - key: ALPACA_API_SECRET_KEY
        sync: false
