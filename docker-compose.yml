services:
  db:
    image: postgres:16-alpine
    container_name: ai-trading-db
    environment:
      POSTGRES_USER: trading
      POSTGRES_PASSWORD: trading
      POSTGRES_DB: ai_trading
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./apps/api/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trading -d ai_trading"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
